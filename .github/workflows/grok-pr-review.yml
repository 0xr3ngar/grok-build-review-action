name: Grok PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: grok-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      # Check out the PR head so grok can read the actual source files,
      # not just the diff.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Grok review
        uses: ./
        with:
          grok_auth_json: ${{ secrets.GROK_AUTH_JSON }}
          # Optional knobs:
          # model: grok-build
          # effort: high
          # fail_on: bugs          # never | bugs | any
          # status_comments: 'true'
